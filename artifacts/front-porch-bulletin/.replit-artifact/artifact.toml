kind = "web"
previewPath = "/"
title = "The Front Porch Bulletin"
version = "1.0.0"
id = "artifacts/front-porch-bulletin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22678

[services.development]
run = "pnpm --filter @workspace/front-porch-bulletin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/front-porch-bulletin", "run", "build" ]
publicDir = "artifacts/front-porch-bulletin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22678"
BASE_PATH = "/"
