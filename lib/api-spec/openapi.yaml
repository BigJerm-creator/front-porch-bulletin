openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for The Front Porch Bulletin
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Newsletter articles
  - name: categories
    description: Article categories
  - name: admin
    description: Admin-only operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List all articles
      parameters:
        - name: category
          in: query
          schema:
            type: string
          required: false
        - name: featured
          in: query
          schema:
            type: boolean
          required: false
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          required: false
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          required: false
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
          required: false
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: array
                    items:
                      $ref: "#/components/schemas/Article"
                  total:
                    type: integer
                required:
                  - articles
                  - total
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create a new article (requires auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleBody"
      responses:
        "201":
          description: Article created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized

  /articles/featured:
    get:
      operationId: getFeaturedArticles
      tags: [articles]
      summary: Get featured/headline articles
      responses:
        "200":
          description: Featured articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  headline:
                    $ref: "#/components/schemas/Article"
                  secondary:
                    type: array
                    items:
                      $ref: "#/components/schemas/Article"
                required:
                  - secondary

  /articles/summary:
    get:
      operationId: getArticlesSummary
      tags: [articles]
      summary: Get summary stats for all articles
      responses:
        "200":
          description: Summary of article counts by category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticlesSummary"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get a single article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
    put:
      operationId: updateArticle
      tags: [articles]
      summary: Update an article (requires auth)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArticleBody"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete an article (requires auth)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /articles/{id}/archive:
    patch:
      operationId: archiveArticle
      tags: [articles]
      summary: Toggle archived status of an article (requires auth)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                archived:
                  type: boolean
              required:
                - archived
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
        '500':
          description: Failed to generate upload URL.

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.

  /obituaries:
    get:
      operationId: listObituaries
      tags: [obituaries]
      summary: List all obituaries
      responses:
        "200":
          description: List of obituaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  obituaries:
                    type: array
                    items:
                      $ref: "#/components/schemas/Obituary"
                required:
                  - obituaries
    post:
      operationId: createObituary
      tags: [obituaries]
      summary: Create an obituary (requires auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObituaryBody"
      responses:
        "201":
          description: Created obituary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Obituary"
        "401":
          description: Unauthorized

  /obituaries/{id}:
    put:
      operationId: updateObituary
      tags: [obituaries]
      summary: Update an obituary (requires auth)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObituaryBody"
      responses:
        "200":
          description: Updated obituary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Obituary"
        "401":
          description: Unauthorized
    delete:
      operationId: deleteObituary
      tags: [obituaries]
      summary: Delete an obituary (requires auth)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /business-spotlight:
    get:
      operationId: getBusinessSpotlight
      tags: [spotlight]
      summary: Get the current business spotlight
      responses:
        "200":
          description: Current business spotlight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessSpotlight"
        "404":
          description: No business spotlight set
    put:
      operationId: updateBusinessSpotlight
      tags: [spotlight]
      summary: Replace the business spotlight (requires auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessSpotlightBody"
      responses:
        "200":
          description: Updated business spotlight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessSpotlight"
        "401":
          description: Unauthorized

  /group-spotlight:
    get:
      operationId: getGroupSpotlight
      tags: [spotlight]
      summary: Get the current group spotlight
      responses:
        "200":
          description: Current group spotlight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupSpotlight"
        "404":
          description: No group spotlight set
    put:
      operationId: updateGroupSpotlight
      tags: [spotlight]
      summary: Replace the group spotlight (requires auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupSpotlightBody"
      responses:
        "200":
          description: Updated group spotlight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupSpotlight"
        "401":
          description: Unauthorized

  /spotlight:
    get:
      operationId: getSpotlight
      tags: [spotlight]
      summary: Get the current student spotlight
      responses:
        "200":
          description: Current spotlight or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spotlight"
        "404":
          description: No spotlight set
    put:
      operationId: updateSpotlight
      tags: [spotlight]
      summary: Replace the student spotlight (requires auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpotlightBody"
      responses:
        "200":
          description: Updated spotlight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spotlight"
        "401":
          description: Unauthorized

  /churches:
    get:
      operationId: listChurches
      tags: [churches]
      summary: List all churches
      responses:
        "200":
          description: List of churches
          content:
            application/json:
              schema:
                type: object
                properties:
                  churches:
                    type: array
                    items:
                      $ref: "#/components/schemas/Church"
                required:
                  - churches
    post:
      operationId: createChurch
      tags: [churches]
      summary: Add a church (requires auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChurchBody"
      responses:
        "201":
          description: Created church
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Church"
        "401":
          description: Unauthorized

  /churches/{id}:
    put:
      operationId: updateChurch
      tags: [churches]
      summary: Update a church (requires auth)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChurchBody"
      responses:
        "200":
          description: Updated church
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Church"
        "401":
          description: Unauthorized
    delete:
      operationId: deleteChurch
      tags: [churches]
      summary: Delete a church (requires auth)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
                required:
                  - categories

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users with roles (admin only)
      responses:
        "200":
          description: List of users with roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
                required:
                  - users
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/users/{clerkUserId}/role:
    put:
      operationId: setUserRole
      tags: [admin]
      summary: Grant or update a user's role (admin only)
      parameters:
        - name: clerkUserId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetUserRoleBody"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    delete:
      operationId: revokeUserRole
      tags: [admin]
      summary: Revoke a user's role (admin only)
      parameters:
        - name: clerkUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Role revoked
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/me:
    get:
      operationId: getMyRole
      tags: [admin]
      summary: Get the current user's role
      responses:
        "200":
          description: Current user's role info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyRoleResponse"
        "401":
          description: Unauthorized

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Photo:
      type: object
      properties:
        url:
          type: string
        credit:
          type: string
      required:
        - url
        - credit

    Article:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        content:
          type: string
        author:
          type: string
        category:
          type: string
        featured:
          type: boolean
        archived:
          type: boolean
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - content
        - author
        - category
        - featured
        - archived
        - publishedAt
        - createdAt
        - updatedAt

    CreateArticleBody:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        content:
          type: string
        author:
          type: string
        category:
          type: string
        featured:
          type: boolean
          default: false
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
        publishedAt:
          type: string
          format: date-time
      required:
        - title
        - content
        - author
        - category

    UpdateArticleBody:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        content:
          type: string
        author:
          type: string
        category:
          type: string
        featured:
          type: boolean
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
        publishedAt:
          type: string
          format: date-time

    ArticlesSummary:
      type: object
      properties:
        totalArticles:
          type: integer
        totalCategories:
          type: integer
        byCategory:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
            required:
              - category
              - count
        recentCount:
          type: integer
      required:
        - totalArticles
        - totalCategories
        - byCategory
        - recentCount

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        articleCount:
          type: integer
      required:
        - id
        - name
        - slug
        - articleCount

    AdminUser:
      type: object
      properties:
        clerkUserId:
          type: string
        role:
          type: string
        grantedAt:
          type: string
          format: date-time
        email:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
      required:
        - clerkUserId
        - role
        - grantedAt

    SetUserRoleBody:
      type: object
      properties:
        role:
          type: string
          enum: [admin, approved_user]
      required:
        - role

    MyRoleResponse:
      type: object
      properties:
        clerkUserId:
          type: string
        role:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        isApproved:
          type: boolean
      required:
        - clerkUserId
        - isAdmin
        - isApproved

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

    Obituary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        birthDate:
          type: string
          nullable: true
        deathDate:
          type: string
          nullable: true
        hometown:
          type: string
          nullable: true
        content:
          type: string
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - content
        - createdAt
        - updatedAt

    ObituaryBody:
      type: object
      properties:
        name:
          type: string
        birthDate:
          type: string
          nullable: true
        deathDate:
          type: string
          nullable: true
        hometown:
          type: string
          nullable: true
        content:
          type: string
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
      required:
        - name
        - content

    Spotlight:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        school:
          type: string
        grade:
          type: string
        description:
          type: string
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - school
        - grade
        - description
        - createdAt
        - updatedAt

    SpotlightBody:
      type: object
      properties:
        name:
          type: string
        school:
          type: string
        grade:
          type: string
        description:
          type: string
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
      required:
        - name
        - school
        - grade
        - description

    BusinessSpotlight:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        businessType:
          type: string
        description:
          type: string
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - businessType
        - description
        - status
        - createdAt
        - updatedAt

    BusinessSpotlightBody:
      type: object
      properties:
        name:
          type: string
        businessType:
          type: string
        description:
          type: string
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
      required:
        - name
        - businessType
        - description

    GroupSpotlight:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        groupType:
          type: string
        description:
          type: string
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - groupType
        - description
        - status
        - createdAt
        - updatedAt

    GroupSpotlightBody:
      type: object
      properties:
        name:
          type: string
        groupType:
          type: string
        description:
          type: string
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
      required:
        - name
        - groupType
        - description

    Church:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        pastor:
          type: string
        serviceTimes:
          type: string
        phone:
          type: string
        sortOrder:
          type: integer
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - address
        - pastor
        - serviceTimes
        - phone
        - sortOrder
        - createdAt

    ChurchBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        pastor:
          type: string
        serviceTimes:
          type: string
        phone:
          type: string
        sortOrder:
          type: integer
        photoUrl:
          type: string
          nullable: true
        photos:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Photo"
      required:
        - name
        - address
        - pastor
        - serviceTimes
        - phone
